name: Update GitHub Stars

on:
  schedule:
    # Run nightly at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-stars:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update GitHub stars
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/update-github-stars.js

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push to update branch
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git checkout -B automated/update-stars
          git add src/content/showcase/*.yaml
          git commit -m "Update showcase star counts and activity dates

          Automated update of showcase project star counts and lastPushed dates."
          git push --force-with-lease origin automated/update-stars

      - name: Create PR if none exists
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --head "automated/update-stars" --state open --json number --jq '.[].number')
          if [ -z "$EXISTING" ]; then
            gh pr create \
              --title "Update showcase star counts" \
              --body "Automated nightly update of GitHub star counts and last activity dates for showcase projects." \
              --base main \
              --head automated/update-stars
          else
            echo "PR #$EXISTING already exists, updated via force push"
          fi
