name: Deploy to GitHub Pages

on:
  # Trigger the workflow every time you push to the `main` branch
  # Using a different branch name? Replace `main` with your branch’s name
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab on GitHub.
  workflow_dispatch:

# Allow this job to clone the repo and create a page deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v7.0.0
        with:
          # Full history so Starlight can compute git-based "last updated" dates.
          fetch-depth: 0
      - name: Set up Node from .nvmrc (Node 24 -> npm 11.11+, required for min-release-age)
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: Install, build, and upload your site output
        uses: withastro/action@v6.1.1
        with:
          # withastro/action can't read .nvmrc, so keep this in sync with it
          node-version: 24
          # path: . # The root location of your Astro project inside the repository. (optional)
          # package-manager: pnpm@latest # The Node package manager to use. Auto-detected from the lockfile. (optional)
      - name: 'Test'
        run: npx vitest --coverage.enabled true
      - name: "Upload Coverage"
        uses: actions/upload-artifact@v7
        with:
          name: coverage-main
          path: coverage
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5