name: "Octavo"
slug: "octavo"
summary: "A calm, cover-forward iPhone companion for Hardcover"
description: |
  Octavo is a small iPhone companion to Hardcover, built around the handful of things a reader does every day — add a book, check on what's being read now, log progress, finish and rate — and deliberately nothing more.

  Features:
  - Cover-forward Reading grid for what you're currently reading
  - Yearly reading-goal progress bar (when set on Hardcover)
  - Library shelves: Want to Read, Read, and Did Not Finish, with local search by title or author
  - Search Hardcover's catalog by title, author, or ISBN, sorted by popularity
  - Log progress by pages or percent; finish a book and set a half-star rating
  - Optimistic local writes via SwiftData with rollback on API failure
  - Honors Hardcover's 60-requests-per-minute rate limit; remaining budget visible in Settings
  - API token stored in the iOS Keychain; no analytics, no trackers, no third-party accounts

  Octavo is an unofficial third-party client. Requires an iPhone running iOS 26 or later and a Hardcover account with an API token.

