name: "Hardcover TUI"
slug: "hardcover-tui"
summary: "Terminal UI Client for Hardcover —  Browse your library, track your reading and manage your books without leaving the terminal."
description: |
  A terminal-based client for Hardcover built with Go, allowing readers to manage their book tracking without leaving the terminal.

  Features:
  - Update reading status updates (Want to Read, Currently Reading, Read, Did Not Finish)
  - Update ratings and current page numbers
  - Add journal entries to the book 
  - Cross-platform support (Linux, macOS, Windows)
  - Available via go install, AUR, and GitHub releases

